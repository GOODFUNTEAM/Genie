<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時心願牆 - 直式籤紙版</title>
    <style>
        /* 1. 載入自訂字體 (金萱 Medium) */
        @font-face {
            font-family: 'JinXuanMedium';
            src: url('jf-jinxuan-3.1-medium.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap; 
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* 使用更柔和的背景，突顯籤紙 */
            background: radial-gradient(circle at center, #2c3e50 0%, #1a252f 100%);
            color: #333; /* 籤紙上的文字顏色 */
            /* 2. 套用自訂字體 */
            font-family: 'JinXuanMedium', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            height: 100vh;
        }

        #wish-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .title {
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            font-size: 20px;
            letter-spacing: 10px;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 300;
            z-index: 10;
        }

        .wish {
            position: absolute;
            /* 3. 【核心修改】設定為直式書寫 */
            writing-mode: vertical-rl;
            text-orientation: upright; /* 確保直書時文字方向正確 */
            
            /* 4. 設定背景圖片屬性 */
            background-size: 100% 100%; /* 確保圖片完全覆蓋氣泡 */
            background-repeat: no-repeat;
            background-position: center;
            
            /* 5. 調整 Padding，讓文字落在籤紙的正確位置 */
            /* 因為是直式，這裡的 padding 是 (上下, 左右) */
            padding: 50px 25px; /* 根據圖片形狀調大上下邊距 */
            
            /* 設定籤紙的寬高，避免文字過長撐破 */
            width: 60px; /* 根據圖片比例設定 */
            height: auto; /* 高度隨文字長度自動調整，但有最大值 */
            max-height: 400px; /* 限制最大高度 */

            /* 移除原本的樣式 */
            background-color: transparent;
            border-radius: 0;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border: none;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3); /* 保留陰影 */
            
            /* 字體與動畫設定 */
            font-size: var(--size);
            font-weight: 500; /* 加粗一點點 */
            animation: floatUp var(--duration) ease-in-out infinite;
            opacity: 0;
            pointer-events: none;
            /* 調整文字陰影 */
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.8);
        }

        /* 6. 定義三種顏色的 CSS Class */
        .ticket-red { background-image: url('07-RED.png'); }
        .ticket-yel { background-image: url('07-YEL.png'); }
        .ticket-whi { background-image: url('07-WHI.png'); }

        @keyframes floatUp {
            0% { transform: translateY(110vh) translateX(0) scale(0.9); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-30vh) translateX(var(--drift)) scale(1.02); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="title">REAL-TIME WISHES</div>
    <div id="wish-container"></div>

    <script>
        // 你的 Google 試算表 ID
        const SPREADSHEET_ID = '1vTOMwOceLB5s4quJ-GFyPpFgBmU7HvmbtPuiJVA2XRDgkRrWjhb9b4pfurlhA0dTMqOYNO6ZpoZGp3C';
        const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;

        let knownWishes = new Set();
        // 籤紙顏色 Class 陣列
        const ticketClasses = ['ticket-red', 'ticket-yel', 'ticket-whi'];

        async function fetchWishes() {
            try {
                const response = await fetch(`${SHEET_CSV_URL}&nocache=${new Date().getTime()}`);
                const csvData = await response.text();
                
                const rows = csvData.split('\n').map(row => {
                    return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"(.*)"$/, '$1').trim());
                });
                
                for (let i = 1; i < rows.length; i++) {
                    let wishText = rows[i][1]; // B 欄：願望內容
                    const status = rows[i][2]; // C 欄：狀態碼 (1)
                    
                    // 只要狀態是 1，就處理顯示
                    if (status === "1") {
                        // 如果 B 欄是空的，給一個預設文字
                        if (!wishText || wishText.trim() === "") {
                            wishText = "悄悄許下了願望";
                        }

                        // 【核心修改】：如果表單自動產生的字眼是「未填寫願望」，就跳過不處理
                        if (wishText === "未填寫願望") {
                            continue; 
                        }

                        const wishId = wishText + i;

                        if (!knownWishes.has(wishId)) {
                            createWish(wishText);
                            knownWishes.add(wishId);
                        }
                    }
                }
            } catch (e) {
                console.error("同步失敗:", e);
            }
        }

        function createWish(text) {
            const container = document.getElementById('wish-container');
            const el = document.createElement('div');
            el.className = 'wish';
            el.innerText = text;

            // 隨機樣式參數
            const left = Math.random() * 85 + 5; // 調整範圍，避免籤紙貼邊
            const duration = Math.random() * 15 + 25; // 25~40 秒慢慢飄
            const size = Math.random() * 4 + 18;      // 字體大小隨機 18~22px
            const drift = (Math.random() - 0.5) * 150; // 左右搖擺幅度

            // 初始載入時隨機分布在畫面上，之後新產生的從底部出現
            const isInitial = knownWishes.size === 0;
            const delay = isInitial ? Math.random() * duration : 0;

            // 【核心修改】：隨機賦予一個顏色 Class
            const randomColorClass = ticketClasses[Math.floor(Math.random() * ticketClasses.length)];
            el.classList.add(randomColorClass);

            el.style.setProperty('--duration', `${duration}s`);
            el.style.setProperty('--size', `${size}px`);
            el.style.setProperty('--drift', `${drift}px`);
            el.style.left = `${left}%`;
            el.style.animationDelay = `-${delay}s`;

            container.appendChild(el);
        }

        // 啟動程式
        fetchWishes();
        setInterval(fetchWishes, 5000); 
    </script>
</body>
</html>
