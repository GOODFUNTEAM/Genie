<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時心願牆</title>
    <style>
        /* 載入金萱 Medium 字體 */
        @font-face {
            font-family: 'JinXuan';
            src: url('jf-jinxuan-3.1-medium.otf') format('opentype');
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: #2c1a1a; 
            font-family: 'JinXuan', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            height: 100vh;
        }

        #wish-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .wish {
            position: absolute;
            writing-mode: vertical-rl; /* 直式書寫 */
            text-orientation: upright;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            
            /* 籤紙文字位置微調 */
            padding: 65px 15px; 
            width: 50px; 
            min-height: 180px;
            max-height: 380px;

            font-size: var(--size);
            animation: floatUp var(--duration) ease-in-out infinite;
            opacity: 0;
            pointer-events: none;
            filter: drop-shadow(0 5px 12px rgba(0,0,0,0.6));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 隨機籤紙顏色 */
        .ticket-red { background-image: url('07-RED.png'); }
        .ticket-yel { background-image: url('07-YEL.png'); }
        .ticket-whi { background-image: url('07-WHI.png'); }

        @keyframes floatUp {
            0% { transform: translateY(110vh) translateX(0) rotate(1deg); opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { transform: translateY(-40vh) translateX(var(--drift)) rotate(-1deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="wish-container"></div>

    <script>
        // 你的最新試算表 ID
        const SPREADSHEET_ID = '1H-IhwTpeNzHZbdaXvh-MrIN60JLgtVHwF0XzkkCRe2k';
        const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;

        let knownWishes = new Set();
        const ticketClasses = ['ticket-red', 'ticket-yel', 'ticket-whi'];

        async function fetchWishes() {
            try {
                const response = await fetch(`${SHEET_CSV_URL}&t=${new Date().getTime()}`);
                if (!response.ok) return;
                
                const csvData = await response.text();
                // 解析 CSV 資料
                const rows = csvData.split('\n').map(row => 
                    row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"(.*)"$/, '$1').trim())
                );
                
                // 從第 2 列開始讀取 (i=1)
                for (let i = 1; i < rows.length; i++) {
                    const wishText = rows[i][1]; // 只看 B 欄願望內容
                    
                    // 只要內容不是空的，且不是 "未填寫願望"，就全部顯示
                    if (wishText) {
                        const trimmedText = wishText.trim();
                        
                        if (trimmedText !== "" && trimmedText !== "未填寫願望") {
                            // 使用內容 + 索引作為唯一標記，避免重複產生
                            const wishId = trimmedText + i;
                            if (!knownWishes.has(wishId)) {
                                createWish(trimmedText);
                                knownWishes.add(wishId);
                            }
                        }
                    }
                }
            } catch (e) { console.error("同步出錯:", e); }
        }

        function createWish(text) {
            const container = document.getElementById('wish-container');
            const el = document.createElement('div');
            
            // 隨機選一個顏色 Class
            const randomColor = ticketClasses[Math.floor(Math.random() * 3)];
            el.className = `wish ${randomColor}`;
            el.innerText = text;

            const left = Math.random() * 85 + 5;
            const duration = Math.random() * 10 + 25; 
            const size = Math.random() * 4 + 19;      
            const drift = (Math.random() - 0.5) * 180; 
            
            const isInitial = knownWishes.size === 0;
            const delay = isInitial ? Math.random() * duration : 0;

            el.style.setProperty('--duration', `${duration}s`);
            el.style.setProperty('--size', `${size}px`);
            el.style.setProperty('--drift', `${drift}px`);
            el.style.left = `${left}%`;
            el.style.animationDelay = `-${delay}s`;

            container.appendChild(el);
        }

        fetchWishes();
        setInterval(fetchWishes, 5000); 
    </script>
</body>
</html>
