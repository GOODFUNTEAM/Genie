<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>即時心願牆 - 質感進階版</title>
    <style>
        @font-face {
            font-family: 'JinXuan';
            src: url('jf-jinxuan-3.1-medium.otf') format('opentype');
        }

        #bg-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('my_bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            transform: translateZ(0);
            /* 讓背景模糊的變化更順滑 */
            transition: filter 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- 效果 3：抓取時背景變暗、模糊 --- */
        body.is-dragging #bg-fixed {
            filter: blur(8px) brightness(0.6);
        }
        
        /* 抓取時讓其他沒被選中的籤紙也變淡變模糊 */
        body.is-dragging .wish:not(.dragging) {
            opacity: 0.2 !important;
            filter: blur(4px);
            transition: all 0.5s;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            color: #2c1a1a; 
            font-family: 'JinXuan', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            height: 100vh;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        .wish {
            position: absolute;
            writing-mode: vertical-rl;
            text-orientation: upright;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center top;
            padding: 30px 15px;
            box-sizing: border-box;
            display: flex;
            align-items: center; 
            justify-content: center;
            font-size: var(--size);
            line-height: 1.3;
            letter-spacing: 1px;
            
            /* --- 效果 2：使用更豐富的曲線讓上升帶有搖擺感 --- */
            animation: floatUp var(--duration) ease-in-out infinite; 
            opacity: 0;
            text-align: center;
            word-break: break-all;
            cursor: grab;
            transition: transform 0.2s ease-out, opacity 0.3s, filter 0.3s;
        }

        .wish.dragging {
            animation-play-state: paused; 
            cursor: grabbing;
            /* 抓起時稍微發光並放大 */
            transform: translate(var(--tx), var(--ty)) scale(1.25) !important;
            z-index: 1000;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6)) brightness(1.1);
        }

        .wish.returning {
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translate(0, 0) scale(1) !important;
        }

        .ticket-red { background-image: url('07-RED.png'); }
        .ticket-yel { background-image: url('07-YEL.png'); }
        .ticket-whi { background-image: url('07-WHI.png'); }

        /* --- 效果 2：優化後的搖擺動畫 --- */
        @keyframes floatUp {
            0% { 
                transform: translateY(110vh) translateX(0) rotate(2deg); 
                opacity: 0;
                filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
            }
            15% { opacity: 1; }
            /* 漂浮過程中的隨機晃動 */
            30% { transform: translateY(70vh) translateX(20px) rotate(-1deg); }
            60% { transform: translateY(35vh) translateX(-20px) rotate(1deg); }
            85% { opacity: 1; }
            100% { 
                transform: translateY(-95vh) translateX(var(--drift)) rotate(-2deg); 
                opacity: 0;
                /* 飛高後影子拉長變淡 */
                filter: drop-shadow(0 30px 20px rgba(0,0,0,0.1));
            }
        }
    </style>
</head>
<body>
    <div id="bg-fixed"></div>
    <div id="wish-container"></div>

    <script>
        const SPREADSHEET_ID = '1H-IhwTpeNzHZbdaXvh-MrIN60JLgtVHwF0XzkkCRe2k';
        const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;

        let knownWishes = new Set();
        const ticketClasses = ['ticket-red', 'ticket-yel', 'ticket-whi'];

        async function fetchWishes() {
            try {
                const response = await fetch(`${SHEET_CSV_URL}&t=${new Date().getTime()}`);
                if (!response.ok) return;
                const csvData = await response.text();
                const rows = csvData.split('\n').map(row => 
                    row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"(.*)"$/, '$1').trim())
                );
                
                for (let i = 1; i < rows.length; i++) {
                    const wishText = rows[i][1]; 
                    if (wishText && wishText !== "未填寫願望" && wishText.trim() !== "") {
                        const wishId = wishText + i;
                        if (!knownWishes.has(wishId)) {
                            createWish(wishText);
                            knownWishes.add(wishId);
                        }
                    }
                }
            } catch (e) { console.error(e); }
        }

        function createWish(text) {
            const container = document.getElementById('wish-container');
            const el = document.createElement('div');
            el.className = `wish ${ticketClasses[Math.floor(Math.random() * 3)]}`;
            el.innerText = text;

            const left = Math.random() * 80 + 10;
            const duration = Math.random() * 5 + 12; 
            const drift = (Math.random() - 0.5) * 250;
            
            let baseWidth = 110;
            let fontSize = 16; 
            if (text.length > 8) { baseWidth = 140; fontSize = 14; }
            if (text.length > 15) { fontSize = 12; }
            
            const baseHeight = baseWidth * (900 / 600);

            el.style.width = `${baseWidth}px`;
            el.style.height = `${baseHeight}px`;
            el.style.setProperty('--duration', `${duration}s`);
            el.style.setProperty('--size', `${fontSize}px`);
            el.style.setProperty('--drift', `${drift}px`);
            el.style.left = `${left}%`;
            
            const isInitial = knownWishes.size === 0;
            el.style.animationDelay = isInitial ? `-${Math.random() * duration}s` : '0s';

            let startX, startY, currentX = 0, currentY = 0;

            const startDrag = (e) => {
                const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                startX = clientX - currentX;
                startY = clientY - currentY;
                
                el.classList.add('dragging');
                document.body.classList.add('is-dragging'); // 觸發背景模糊
                el.classList.remove('returning');
                
                document.addEventListener('mousemove', drag);
                document.addEventListener('touchmove', drag, { passive: false });
                document.addEventListener('mouseup', stopDrag);
                document.addEventListener('touchend', stopDrag);
            };

            const drag = (e) => {
                if (!el.classList.contains('dragging')) return;
                e.preventDefault();
                const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                currentX = clientX - startX;
                currentY = clientY - startY;
                
                el.style.setProperty('--tx', `${currentX}px`);
                el.style.setProperty('--ty', `${currentY}px`);
                el.style.transform = `translate(${currentX}px, ${currentY}px) scale(1.25)`;
            };

            const stopDrag = () => {
                el.classList.remove('dragging');
                document.body.classList.remove('is-dragging'); // 恢復背景
                el.classList.add('returning'); 
                
                setTimeout(() => {
                    currentX = 0;
                    currentY = 0;
                    el.classList.remove('returning');
                    el.style.transform = ''; 
                }, 600);

                document.removeEventListener('mousemove', drag);
                document.removeEventListener('touchmove', drag);
                document.removeEventListener('mouseup', stopDrag);
                document.removeEventListener('touchend', stopDrag);
            };

            el.addEventListener('mousedown', startDrag);
            el.addEventListener('touchstart', startDrag, { passive: false });

            container.appendChild(el);
        }

        fetchWishes();
        setInterval(fetchWishes, 5000); 
    </script>
</body>
</html>
