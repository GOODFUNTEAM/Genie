<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>許願牆</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            height: 100vh;
        }

        #wish-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .wish {
            position: absolute;
            white-space: nowrap;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            animation: floatUp var(--duration) linear infinite;
            font-size: var(--size);
            opacity: 0;
            transition: transform 0.3s ease;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(110vh) translateX(0);
                opacity: 0;
            }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% {
                transform: translateY(-20vh) translateX(var(--drift));
                opacity: 0;
            }
        }

        .title {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 24px;
            letter-spacing: 5px;
            color: rgba(255, 255, 255, 0.5);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="title">大家的願望</div>
    <div id="wish-container"></div>

    <script>
        // 這是你提供的連結（已轉換為 CSV 格式）
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTOMwOceLB5s4quJ-GFyPpFgBmU7HvmbtPuiJVA2XRDgkRrWjhb9b4pfurlhA0dTMqOYNO6ZpoZGp3C/pub?output=csv';

        let knownWishes = new Set();

        async function fetchWishes() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvData = await response.text();
                
                // 解析 CSV 並取得 B 欄 (願望內容)
                const rows = csvData.split('\n').map(row => row.split(','));
                
                // 從第二列開始遍歷 (index 1)，因為第一列是標題
                for (let i = 1; i < rows.length; i++) {
                    const wishText = rows[i][1]; // 這裡對應 B 欄：願望內容
                    
                    if (wishText && wishText.trim() !== "" && !knownWishes.has(wishText + i)) {
                        createWish(wishText.trim());
                        knownWishes.add(wishText + i);
                    }
                }
            } catch (e) {
                console.error("資料讀取失敗:", e);
            }
        }

        function createWish(text) {
            const container = document.getElementById('wish-container');
            const el = document.createElement('div');
            el.className = 'wish';
            el.innerText = text;

            // 隨機化效果
            const left = Math.random() * 80 + 5; 
            const duration = Math.random() * 10 + 20; // 慢速飄動 20-30 秒
            const size = Math.random() * 8 + 18; // 字體 18-26px
            const drift = (Math.random() - 0.5) * 150; 
            const delay = Math.random() * 20;

            el.style.setProperty('--duration', `${duration}s`);
            el.style.setProperty('--size', `${size}px`);
            el.style.setProperty('--drift', `${drift}px`);
            el.style.left = `${left}%`;
            // 負的 delay 讓初始進入網頁時願望就錯落在畫面各處
            el.style.animationDelay = `-${delay}s`;

            container.appendChild(el);
        }

        // 每 20 秒檢查一次 Google 試算表有無新資料
        fetchWishes();
        setInterval(fetchWishes, 20000);
    </script>
</body>
</html>
