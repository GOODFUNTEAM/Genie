<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時心願牆 - 互動強化版</title>
    <style>
        @font-face {
            font-family: 'JinXuan';
            src: url('jf-jinxuan-3.1-medium.otf') format('opentype');
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-image: url('my_bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #2c1a1a; 
            font-family: 'JinXuan', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            height: 100vh;
            touch-action: none;
            /* 防止整個網頁被選取 */
            user-select: none;
            -webkit-user-select: none;
        }

        #wish-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .wish {
            position: absolute;
            writing-mode: vertical-rl;
            text-orientation: upright;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center top;
            padding: 30px 15px; /* 稍微增加上下 Padding */
            box-sizing: border-box;
            display: flex;
            align-items: center; 
            justify-content: center;
            
            /* --- 文字大小優化 --- */
            font-size: var(--size);
            line-height: 1.3;
            letter-spacing: 1px;
            
            animation: floatUp var(--duration) linear infinite; 
            opacity: 0;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
            text-align: center;
            word-break: break-all;
            
            cursor: grab;
            
            /* --- 核心修改：禁止文字選取 --- */
            user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
            
            transition: transform 0.2s ease-out, opacity 0.3s; 
        }

        .wish.dragging {
            animation-play-state: paused; 
            cursor: grabbing;
            transform: translate(var(--tx), var(--ty)) scale(1.2) !important;
            z-index: 1000;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.5));
        }

        .wish.returning {
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translate(0, 0) scale(1) !important;
        }

        .ticket-red { background-image: url('07-RED.png'); }
        .ticket-yel { background-image: url('07-YEL.png'); }
        .ticket-whi { background-image: url('07-WHI.png'); }

        @keyframes floatUp {
            0% { transform: translateY(110vh) translateX(0) rotate(1deg); opacity: 0; }
            5% { opacity: 1; }
            95% { opacity: 1; }
            100% { transform: translateY(-85vh) translateX(var(--drift)) rotate(-1deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="wish-container"></div>

    <script>
        const SPREADSHEET_ID = '1H-IhwTpeNzHZbdaXvh-MrIN60JLgtVHwF0XzkkCRe2k';
        const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv`;

        let knownWishes = new Set();
        const ticketClasses = ['ticket-red', 'ticket-yel', 'ticket-whi'];

        async function fetchWishes() {
            try {
                const response = await fetch(`${SHEET_CSV_URL}&t=${new Date().getTime()}`);
                if (!response.ok) return;
                const csvData = await response.text();
                const rows = csvData.split('\n').map(row => 
                    row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"(.*)"$/, '$1').trim())
                );
                
                for (let i = 1; i < rows.length; i++) {
                    const wishText = rows[i][1]; 
                    if (wishText && wishText !== "未填寫願望" && wishText.trim() !== "") {
                        const wishId = wishText + i;
                        if (!knownWishes.has(wishId)) {
                            createWish(wishText);
                            knownWishes.add(wishId);
                        }
                    }
                }
            } catch (e) { console.error(e); }
        }

        function createWish(text) {
            const container = document.getElementById('wish-container');
            const el = document.createElement('div');
            el.className = `wish ${ticketClasses[Math.floor(Math.random() * 3)]}`;
            el.innerText = text;

            const left = Math.random() * 80 + 10;
            const duration = Math.random() * 5 + 10; // 再次微調，讓速度感更強 (10~15秒)
            const drift = (Math.random() - 0.5) * 220;
            
            /* --- 修改：縮小字體級距 --- */
            let baseWidth = 110;  // 稍微縮小基礎寬度
            let fontSize = 17;    // 基礎小字 (原本 20)
            
            if (text.length > 8) {
                baseWidth = 140; 
                fontSize = 15;    // 長難句更小 (原本 18)
            }
            if (text.length > 15) {
                fontSize = 13;    // 極長句縮到 13px
            }
            
            const baseHeight = baseWidth * (900 / 600);

            el.style.width = `${baseWidth}px`;
            el.style.height = `${baseHeight}px`;
            el.style.setProperty('--duration', `${duration}s`);
            el.style.setProperty('--size', `${fontSize}px`);
            el.style.setProperty('--drift', `${drift}px`);
            el.style.left = `${left}%`;
            
            const isInitial = knownWishes.size === 0;
            el.style.animationDelay = isInitial ? `-${Math.random() * duration}s` : '0s';

            let startX, startY, currentX = 0, currentY = 0;

            const startDrag = (e) => {
                const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                startX = clientX - currentX;
                startY = clientY - currentY;
                
                el.classList.add('dragging');
                el.classList.remove('returning');
                
                document.addEventListener('mousemove', drag);
                document.addEventListener('touchmove', drag, { passive: false });
                document.addEventListener('mouseup', stopDrag);
                document.addEventListener('touchend', stopDrag);
            };

            const drag = (e) => {
                if (!el.classList.contains('dragging')) return;
                e.preventDefault();
                const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                currentX = clientX - startX;
                currentY = clientY - startY;
                
                el.style.setProperty('--tx', `${currentX}px`);
                el.style.setProperty('--ty', `${currentY}px`);
                el.style.transform = `translate(${currentX}px, ${currentY}px) scale(1.2)`;
            };

            const stopDrag = () => {
                el.classList.remove('dragging');
                el.classList.add('returning'); 
                
                setTimeout(() => {
                    currentX = 0;
                    currentY = 0;
                    el.classList.remove('returning');
                    el.style.transform = ''; 
                    el.style.removeProperty('--tx');
                    el.style.removeProperty('--ty');
                }, 500);

                document.removeEventListener('mousemove', drag);
                document.removeEventListener('touchmove', drag);
                document.removeEventListener('mouseup', stopDrag);
                document.removeEventListener('touchend', stopDrag);
            };

            el.addEventListener('mousedown', startDrag);
            el.addEventListener('touchstart', startDrag, { passive: false });

            container.appendChild(el);
        }

        fetchWishes();
        setInterval(fetchWishes, 5000); 
    </script>
</body>
</html>
